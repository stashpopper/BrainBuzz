version: '3.8'

services:
  # ── Python FastAPI service ───────────────────────────────────────────────────
  python-service:
    build:
      context: ./backend/python_service
      dockerfile: Dockerfile
    container_name: brainbuzz-python
    restart: always
    environment:
      - MISTRAL_API_KEY=${MISTRAL_API_KEY}
      - MONGODB_URI=${MONGODB_URI}
      - MONGODB_DB_NAME=${MONGODB_DB_NAME:-test}
    ports:
      - "5002:5002"
    volumes:
      - uploads_data:/app/uploads
    networks:
      - brainbuzz-network

  # ── Node.js API backend ──────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: brainbuzz-api
    restart: always
    environment:
      - NODE_ENV=production
      - PORT=5001
      - MONGODB_URI=${MONGODB_URI}
      - JWT_SECRET=${JWT_SECRET}
      - CLOUDINARY_URL=${CLOUDINARY_URL}
      - PYTHON_SERVICE_URL=http://python-service:5002
    ports:
      - "5001:5001"
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      - python-service
    networks:
      - brainbuzz-network

volumes:
  uploads_data:

networks:
  brainbuzz-network:
    driver: bridge